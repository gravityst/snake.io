<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake.io</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      cursor: crosshair;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    /* Start screen */
    #startScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 70%);
    }
    #startScreen h1 {
      font-size: 72px;
      color: #fff;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #08f;
      margin-bottom: 40px;
      letter-spacing: 4px;
    }
    #startScreen input {
      width: 300px;
      padding: 14px 20px;
      font-size: 20px;
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      background: rgba(0, 20, 40, 0.8);
      color: #fff;
      text-align: center;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }
    #startScreen input:focus {
      border-color: #0ff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }
    #startScreen button {
      width: 300px;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #0ff, #08f);
      color: #0a0a1a;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 2px;
    }
    #startScreen button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }
    #startScreen .subtitle {
      color: rgba(255,255,255,0.4);
      margin-top: 20px;
      font-size: 14px;
    }

    /* Death screen */
    #deathScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(10, 10, 26, 0.85);
      backdrop-filter: blur(10px);
    }
    #deathScreen h2 {
      font-size: 48px;
      color: #f44;
      text-shadow: 0 0 20px #f44;
      margin-bottom: 10px;
    }
    #deathScreen .score {
      font-size: 28px;
      color: #fff;
      margin-bottom: 30px;
    }
    #deathScreen button {
      padding: 14px 40px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #0ff, #08f);
      color: #0a0a1a;
      cursor: pointer;
      transition: transform 0.2s;
      letter-spacing: 2px;
    }
    #deathScreen button:hover {
      transform: scale(1.05);
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
      display: none;
    }
    #leaderboard {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 10, 20, 0.7);
      border: 1px solid rgba(0, 255, 255, 0.15);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 200px;
      backdrop-filter: blur(5px);
    }
    #leaderboard h3 {
      color: #0ff;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-align: center;
    }
    #leaderboard .entry {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      padding: 2px 0;
      display: flex;
      justify-content: space-between;
    }
    #leaderboard .entry.me {
      color: #0ff;
      font-weight: bold;
    }
    #myScore {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      text-shadow: 0 0 10px rgba(0,255,255,0.5);
    }
    #minimap {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 150px;
      height: 150px;
      background: rgba(0, 10, 20, 0.6);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 8px;
    }
    #playerCount {
      position: absolute;
      top: 10px;
      left: 10px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    #ping {
      position: absolute;
      top: 30px;
      left: 10px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="startScreen">
    <h1>SNAKE.IO</h1>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="16" autofocus>
    <button id="playBtn">PLAY</button>
    <p class="subtitle">Use mouse to steer — Click or Space to boost</p>
  </div>

  <div id="deathScreen">
    <h2>YOU DIED</h2>
    <p class="score">Score: <span id="finalScore">0</span></p>
    <button id="respawnBtn">PLAY AGAIN</button>
  </div>

  <div id="hud">
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <div id="leaderboardEntries"></div>
    </div>
    <div id="myScore">Score: 0</div>
    <canvas id="minimap" width="150" height="150"></canvas>
    <div id="playerCount">Players: 0</div>
    <div id="ping"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
