<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake.io</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      cursor: crosshair;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    /* Flat outline button */
    .glass-btn {
      padding: 14px 40px;
      font-size: 20px;
      font-weight: bold;
      border: 1.5px solid rgba(0, 255, 255, 0.45);
      border-radius: 30px;
      background: transparent;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      letter-spacing: 2px;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s, color 0.2s;
    }
    .glass-btn:hover {
      transform: scale(1.04);
      border-color: #0ff;
      color: #fff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
    }
    .glass-btn:active { transform: scale(0.97); }
    .glass-btn.accent-orange { border-color: rgba(255, 136, 0, 0.5); color: rgba(255,180,100,0.9); }
    .glass-btn.accent-orange:hover { border-color: #f80; color: #fff; box-shadow: 0 0 20px rgba(255,136,0,0.15); }
    .glass-btn.accent-pink { border-color: rgba(255, 0, 255, 0.4); color: rgba(255,150,255,0.9); }
    .glass-btn.accent-pink:hover { border-color: #f0f; color: #fff; box-shadow: 0 0 20px rgba(255,0,255,0.15); }

    /* Start screen */
    #startScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: transparent; /* bg canvas shows through */
    }
    #startScreen h1 {
      font-size: 72px;
      color: #fff;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #08f;
      margin-bottom: 10px;
      letter-spacing: 6px;
      animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #08f; }
      50% { text-shadow: 0 0 30px #0ff, 0 0 60px #0ff, 0 0 120px #08f, 0 0 160px #04d; }
    }
    #startScreen .tagline {
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      letter-spacing: 3px;
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    #startScreen input {
      width: 320px;
      padding: 14px 20px;
      font-size: 18px;
      border: 1.5px solid rgba(0, 255, 255, 0.25);
      border-radius: 30px;
      background: rgba(0, 10, 20, 0.6);
      color: #fff;
      text-align: center;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #startScreen input:focus {
      border-color: #0ff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
    }
    #startScreen .glass-btn { width: 320px; font-size: 20px; }
    #startScreen .subtitle {
      color: rgba(255,255,255,0.3);
      margin-top: 24px;
      font-size: 13px;
      letter-spacing: 1px;
    }
    #onlineCount {
      font-size: 11px; color: #0ff; opacity: 0.7;
      margin-top: 2px;
    }

    /* Skin picker screen */
    #skinScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 70%);
    }
    #skinScreen h2 {
      font-size: 36px;
      color: #fff;
      text-shadow: 0 0 15px #0ff;
      margin-bottom: 30px;
      letter-spacing: 3px;
    }
    .skin-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 520px;
      margin-bottom: 30px;
      padding: 0 20px;
    }
    .skin-card {
      width: 110px;
      height: 90px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      background: rgba(0, 20, 40, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .skin-card:hover {
      transform: scale(1.08);
      border-color: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
    }
    .skin-card.selected {
      border-color: #0ff;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.3), inset 0 0 15px rgba(0, 255, 255, 0.05);
      background: rgba(0, 40, 60, 0.5);
    }
    .skin-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .skin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }
    .skin-name {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .skin-back-btn {
      padding: 10px 30px;
      font-size: 16px;
    }

    /* Death screen */
    #deathScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(10, 10, 26, 0.85);
      backdrop-filter: blur(10px);
    }
    #deathScreen h2 {
      font-size: 48px;
      color: #f44;
      text-shadow: 0 0 20px #f44;
      margin-bottom: 10px;
    }
    #deathScreen .score {
      font-size: 28px;
      color: #fff;
      margin-bottom: 30px;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
      display: none;
    }
    #leaderboard {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 10, 20, 0.7);
      border: 1px solid rgba(0, 255, 255, 0.15);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 200px;
      backdrop-filter: blur(5px);
    }
    #leaderboard h3 {
      color: #0ff;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-align: center;
    }
    #leaderboard .entry {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      padding: 2px 0;
      display: flex;
      justify-content: space-between;
    }
    #leaderboard .entry.me {
      color: #0ff;
      font-weight: bold;
    }
    #myScore {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      text-shadow: 0 0 10px rgba(0,255,255,0.5);
    }
    #minimap {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 150px;
      height: 150px;
      background: rgba(0, 10, 20, 0.6);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 8px;
    }
    #playerCount {
      position: absolute;
      top: 10px;
      left: 10px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    #ping {
      position: absolute;
      top: 30px;
      left: 10px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }

    /* Button row on start screen */
    .btn-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .btn-row .glass-btn { flex: 1; width: 180px; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .multiplayer-btn { border-color: rgba(0,255,255,0.55) !important; }
    .multiplayer-btn svg { width: 20px; height: 20px; stroke: #0ff; fill: none; stroke-width: 1.5; flex-shrink: 0; }

    /* Room select screen */
    #roomScreen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 70%);
    }
    #roomScreen h2 { font-size: 36px; color: #fff; text-shadow: 0 0 15px #0ff; margin-bottom: 24px; letter-spacing: 3px; }
    .room-list { display: flex; flex-direction: column; gap: 10px; max-height: 55vh; overflow-y: auto; width: 420px; padding: 0 10px; margin-bottom: 24px; }
    .room-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border: 1.5px solid rgba(0,255,255,0.15); border-radius: 16px;
      background: rgba(0,20,40,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      cursor: pointer; transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .room-card:hover { transform: scale(1.03); border-color: rgba(0,255,255,0.5); box-shadow: 0 0 20px rgba(0,255,255,0.12); }
    .room-card.full { opacity: 0.4; cursor: not-allowed; }
    .room-card .room-name { color: #fff; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    .room-card .room-players { color: #0ff; font-size: 14px; font-weight: bold; }

    /* AI badge */
    .ai-badge {
      font-size: 9px; background: rgba(0,255,255,0.12); border: 1px solid rgba(0,255,255,0.35);
      border-radius: 4px; padding: 1px 5px; margin-left: 6px; color: #0ff; font-weight: bold;
      letter-spacing: 1px; vertical-align: middle;
    }
    /* Room card badges */
    .mode-badge {
      font-size: 10px; border-radius: 4px; padding: 2px 8px; font-weight: bold;
      letter-spacing: 1px; text-transform: uppercase; margin-right: 10px; flex-shrink: 0;
    }
    .mode-badge.solo { background: rgba(0,255,255,0.12); border: 1px solid rgba(0,255,255,0.3); color: #0ff; }
    .mode-badge.team { background: rgba(255,136,0,0.12); border: 1px solid rgba(255,136,0,0.3); color: #f80; }
    .mode-badge.custom { background: rgba(255,0,255,0.12); border: 1px solid rgba(255,0,255,0.3); color: #f0f; }
    .room-card .room-left { display: flex; align-items: center; gap: 8px; }

    /* Team selector screen */
    #teamScreen {
      position: fixed; top:0; left:0; right:0; bottom:0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 70%);
    }
    #teamScreen h2 { font-size: 36px; color: #fff; text-shadow: 0 0 15px #f80; margin-bottom: 24px; letter-spacing: 3px; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; width: 500px; margin-bottom: 24px; }
    .team-card {
      padding: 16px 12px; border-radius: 14px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(0,20,40,0.4); backdrop-filter: blur(8px);
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    }
    .team-card:hover { transform: scale(1.06); border-color: rgba(255,255,255,0.4); }
    .team-card .team-color { width: 24px; height: 24px; border-radius: 50%; }
    .team-card .team-name { color: #fff; font-size: 14px; font-weight: bold; }
    .team-card .team-count { color: rgba(255,255,255,0.4); font-size: 12px; }
    .team-card.full { opacity: 0.35; cursor: not-allowed; }

    /* Create room screen */
    #createRoomScreen {
      position: fixed; top:0; left:0; right:0; bottom:0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 70%);
    }
    #createRoomScreen h2 { font-size: 32px; color: #fff; text-shadow: 0 0 15px #f0f; margin-bottom: 20px; letter-spacing: 3px; }
    .create-form { display: flex; flex-direction: column; gap: 14px; width: 340px; align-items: center; }
    .create-form input, .create-form select {
      width: 100%; padding: 12px 16px; font-size: 16px; border-radius: 14px;
      border: 1.5px solid rgba(0,255,255,0.25); background: rgba(0,20,40,0.5);
      backdrop-filter: blur(8px); color: #fff; outline: none;
    }
    .create-form select { appearance: none; cursor: pointer; }
    .create-form select option { background: #0a0a1a; color: #fff; }
    .acc-card {
      width: 110px; height: 70px; border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px; background: rgba(0,20,40,0.4); backdrop-filter: blur(6px);
      cursor: pointer; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; transition: transform 0.2s, border-color 0.3s;
      position: relative; overflow: hidden;
    }
    .acc-card:hover { transform: scale(1.06); border-color: rgba(255,136,0,0.5); }
    .acc-card.selected { border-color: #f80; box-shadow: 0 0 20px rgba(255,136,0,0.2); background: rgba(40,20,0,0.4); }
    .acc-card canvas { pointer-events: none; }
    .acc-card .acc-name { color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Loading screen for multiplayer cold start -->
  <div id="loadingScreen" style="position:fixed;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:#0a0a1a;">
    <div style="font-size:24px;color:#0ff;letter-spacing:3px;margin-bottom:20px;">CONNECTING...</div>
    <div style="width:200px;height:4px;background:rgba(0,255,255,0.1);border-radius:2px;overflow:hidden;">
      <div id="loadingBar" style="width:0%;height:100%;background:#0ff;border-radius:2px;transition:width 0.3s;"></div>
    </div>
    <div style="color:rgba(255,255,255,0.3);font-size:12px;margin-top:12px;">Waking up server...</div>
  </div>

  <!-- Animated background canvas for menu -->
  <canvas id="menuBg" style="position:fixed;top:0;left:0;z-index:99;pointer-events:none;"></canvas>

  <div id="startScreen">
    <h1>SNAKE.IO</h1>
    <p class="tagline">Eat. Grow. Dominate.</p>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="16" autofocus>
    <button class="glass-btn" id="playAIBtn" style="margin-bottom:10px;">PLAY VS AI</button>
    <button class="glass-btn" id="multiplayerBtn" style="margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#0ff;fill:none;stroke-width:1.5;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
      MULTIPLAYER
    </button>
    <button class="glass-btn accent-pink" id="skinsBtn" style="width:320px;font-size:17px;">SKINS & ACCESSORIES</button>
    <p class="subtitle">Mouse to steer &middot; Click or Space to boost</p>
  </div>

  <div id="roomScreen">
    <h2>SELECT ROOM</h2>
    <div class="room-list" id="roomList"></div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="glass-btn skin-back-btn" id="roomBackBtn">BACK</button>
      <button class="glass-btn skin-back-btn" id="createRoomBtn" style="border-color:rgba(255,0,255,0.4);color:#f0f;">+ CREATE ROOM</button>
    </div>
  </div>

  <div id="teamScreen">
    <h2>PICK YOUR TEAM</h2>
    <div class="team-grid" id="teamGrid"></div>
    <button class="glass-btn skin-back-btn" id="teamBackBtn">BACK</button>
  </div>

  <div id="createRoomScreen">
    <h2>CREATE ROOM</h2>
    <div class="create-form">
      <input type="text" id="roomNameInput" placeholder="Room name" maxlength="24">
      <select id="roomModeSelect">
        <option value="solo">Solo — Free for All</option>
        <option value="team">Team Battle</option>
      </select>
      <select id="roomTeamSizeSelect" style="display:none;">
        <option value="2">2 players per team</option>
        <option value="3">3 players per team</option>
      </select>
      <button class="glass-btn" id="createRoomSubmit" style="width:100%;">CREATE</button>
      <button class="glass-btn skin-back-btn" id="createRoomBackBtn">BACK</button>
    </div>
  </div>

  <div id="skinScreen">
    <h2>CHOOSE SKIN</h2>
    <canvas id="skinPreview" width="320" height="120" style="border:1px solid rgba(0,255,255,0.15);border-radius:12px;background:rgba(0,10,20,0.5);margin-bottom:16px;"></canvas>
    <div class="skin-grid" id="skinGrid"></div>
    <h3 style="color:#fff;margin:16px 0 10px;letter-spacing:2px;font-size:16px;text-shadow:0 0 10px rgba(255,136,0,0.4);">ACCESSORIES</h3>
    <div class="skin-grid" id="accessoryGrid" style="max-width:520px;"></div>
    <button class="glass-btn skin-back-btn" id="skinBackBtn">BACK</button>
  </div>

  <div id="deathScreen">
    <h2>YOU DIED</h2>
    <p class="score">Score: <span id="finalScore">0</span></p>
    <button class="glass-btn" id="respawnBtn" style="margin-bottom:10px;">PLAY AGAIN</button>
    <button class="glass-btn accent-orange" id="mainMenuBtn" style="padding:10px 30px;font-size:16px;">MAIN MENU</button>
  </div>

  <div id="hud">
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <div id="leaderboardEntries"></div>
    </div>
    <div id="myScore">Score: 0</div>
    <div id="killCount" style="position:absolute;bottom:42px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:13px;"></div>
    <canvas id="minimap" width="150" height="150"></canvas>
    <div id="playerCount">Players: 0</div>
    <div id="ping"></div>
    <div id="killFeedContainer" style="position:absolute;top:50px;left:50%;transform:translateX(-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;"></div>
  </div>

  <!-- Chat wheel -->
  <div id="chatWheel" style="position:fixed;top:0;left:0;right:0;bottom:0;display:none;z-index:90;pointer-events:all;">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-wrap:wrap;gap:8px;width:240px;justify-content:center;"></div>
  </div>

  <script src="local-game.js"></script>
  <script src="game.js"></script>
</body>
</html>
